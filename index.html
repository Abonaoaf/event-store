<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة منصة قبل الحدث</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --success: #10b981; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* إصلاح ظهور اللوجو */
        .brand-logo { width: 180px; height: auto; margin-bottom: 20px; border-radius: 15px; display: block; }
        
        #adminArea { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; margin-bottom: 20px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 0.9rem; }
        
        .btn-main { width: 100%; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-save { background: var(--primary); }
        .btn-update { background: var(--success); display: none; }

        /* قائمة المشتركين مع أزرار التحكم */
        .client-list-item { background: #f8fafc; padding: 12px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .actions i { cursor: pointer; margin-right: 15px; font-size: 1.1rem; }
        .fa-edit { color: var(--primary); }
        .fa-trash { color: var(--danger); }

        /* تصميم بطاقة العميل والعد التنازلي */
        .client-card { background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 420px; overflow: hidden; display: none; }
        .timer-display { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; padding: 10px; }
        .unit { background: #f1f5f9; padding: 10px 2px; border-radius: 10px; text-align: center; }
        .unit b { display: block; color: var(--primary); font-size: 1.2rem; }
        .unit span { font-size: 0.6rem; color: #64748b; }
    </style>
</head>
<body>

    <img src="https://abonaoaf.github.io/event-store/hdh.PNG" class="brand-logo" alt="لوجو قبل الحدث" onerror="this.src='https://abonaoaf.github.io/apps/hdh.PNG'">

    <div id="adminArea">
        <h3 id="formTitle" style="text-align:center; color:var(--primary);">إضافة مشترك جديد</h3>
        <input type="hidden" id="editIndex">
        <div class="form-group"><label>اسم العميل</label><input type="text" id="adm-name"></div>
        <div class="form-group"><label>رقم الجوال</label><input type="text" id="adm-phone"></div>
        <div class="form-group"><label>اسم المستخدم</label><input type="text" id="adm-user"></div>
        <div class="form-group"><label>الرقم السري</label><input type="text" id="adm-pass"></div>
        <div class="form-group"><label>رابط السيرفر</label><input type="text" id="adm-link"></div>
        <div class="form-group"><label>شرح الاشتراك</label><textarea id="adm-desc"></textarea></div>
        <div class="form-group"><label>نهاية الاشتراك (التاريخ والوقت)</label><input type="datetime-local" id="adm-expiry"></div>
        
        <button id="saveBtn" class="btn-main btn-save" onclick="saveClient()">حفظ المشترك</button>
        <button id="updateBtn" class="btn-main btn-update" onclick="updateClient()">تعديل البيانات</button>
        
        <div id="clientsList" style="margin-top:20px;"></div>
    </div>

    <div id="clientView" class="client-card">
        <div id="statusBadge" style="padding:10px; text-align:center; color:white; font-weight:bold;"></div>
        <div style="padding:20px; text-align:center;">
            <h2 id="v-name"></h2>
            <p id="v-desc" style="color:#64748b;"></p>
        </div>
        <div class="timer-display" id="timer"></div>
    </div>

<script>
    const BIN_ID = '69ccd25636566621a86b0b49';
    const API_KEY = '$2a$10$tF3fZ9rbdTzLIljwr83BlOtuLCKngwBUbeK9//NpVH8Mwkfh4GTmu';
    let db = { clients: [] };

    async function init() {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
        const data = await res.json();
        db = data.record;

        const params = new URLSearchParams(window.location.search);
        if (params.get('admin') === '123') {
            document.getElementById('adminArea').style.display = 'block';
            renderList();
        } else if (params.get('user')) {
            showClient(decodeURIComponent(params.get('user')));
        }
    }

    function renderList() {
        const list = document.getElementById('clientsList');
        list.innerHTML = "<b>قائمة الإدارة:</b>" + db.clients.map((c, i) => `
            <div class="client-list-item">
                <span>${c.name}</span>
                <div class="actions">
                    <i class="fas fa-edit" onclick="editMode(${i})"></i>
                    <i class="fas fa-trash" onclick="deleteClient(${i})"></i>
                </div>
            </div>
        `).join('');
    }

    function editMode(i) {
        const c = db.clients[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('adm-name').value = c.name;
        document.getElementById('adm-phone').value = c.phone;
        document.getElementById('adm-user').value = c.plan;
        document.getElementById('adm-pass').value = c.pass;
        document.getElementById('adm-link').value = c.link;
        document.getElementById('adm-desc').value = c.desc;
        document.getElementById('adm-expiry').value = c.expiry;
        
        document.getElementById('saveBtn').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'block';
        document.getElementById('formTitle').innerText = "تعديل بيانات: " + c.name;
        window.scrollTo(0,0);
    }

    async function updateClient() {
        const i = document.getElementById('editIndex').value;
        db.clients[i] = getFormData();
        await sync();
        location.reload();
    }

    async function saveClient() {
        db.clients.push(getFormData());
        await sync();
        location.reload();
    }

    function getFormData() {
        return {
            name: document.getElementById('adm-name').value,
            phone: document.getElementById('adm-phone').value,
            plan: document.getElementById('adm-user').value,
            pass: document.getElementById('adm-pass').value,
            link: document.getElementById('adm-link').value,
            desc: document.getElementById('adm-desc').value,
            expiry: document.getElementById('adm-expiry').value
        };
    }

    async function sync() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(db)
        });
    }

    async function deleteClient(i) {
        if(confirm("حذف العميل نهائياً؟")) { db.clients.splice(i, 1); await sync(); renderList(); }
    }

    function showClient(name) {
        const c = db.clients.find(x => x.name === name);
        if (!c) return;
        document.getElementById('clientView').style.display = 'block';
        document.getElementById('v-name').innerText = c.name;
        document.getElementById('v-desc').innerText = c.desc;
        
        setInterval(() => {
            const diff = new Date(c.expiry) - new Date();
            const badge = document.getElementById('statusBadge');
            if(diff <= 0) {
                badge.innerText = "منتهي ⚠️"; badge.style.background = "var(--danger)";
            } else {
                badge.innerText = "فعال ✅"; badge.style.background = "var(--success)";
                const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff/(1000*60*60))%24), m = Math.floor((diff/(1000*60))%60), s = Math.floor((diff/1000)%60);
                document.getElementById('timer').innerHTML = `<div class="unit"><b>${d}</b><span>يوم</span></div><div class="unit"><b>${h}</b><span>ساعة</span></div><div class="unit"><b>${m}</b><span>دقيقة</span></div><div class="unit"><b>${s}</b><span>ثانية</span></div>`;
            }
        }, 1000);
    }

    init();
</script>
</body>
</html>
