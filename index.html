<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المشتركين | فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --whatsapp: #25d366; --danger: #dc3545; --text: #2d3748; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text); }
        
        /* التنسيقات العامة */
        .status-bar { height: 6px; width: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        .status-msg { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .progress-container { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 100%; transition: width 1s linear; float: right; }

        /* شاشة التحميل */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* واجهة العميل */
        .client-view { background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; overflow: hidden; display: none; align-self: center; position: relative; margin: 20px auto; border: 1px solid #eee; }
        .client-header { background: white; padding: 30px 25px; text-align: center; border-bottom: 1px solid #eee; }
        .brand-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .brand-logo, .date-box { width: 90px; height: 90px; background: white; padding: 10px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid #f0f0f0; }
        .date-num { font-size: 1.6rem; font-weight: 900; color: #333; }
        
        #v-name-container { margin: 10px 0; font-weight: 800; font-size: 1.3rem; }
        .welcome-family { font-weight: 800; color: #ff0000; display: block; margin-bottom: 15px; font-size: 1.1rem; }

        .info-body { padding: 20px; }
        .info-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #f8fafc; padding: 12px; border-radius: 12px; border: 1px solid #edf2f7; }
        .label { color: #64748b; font-size: 0.75rem; font-weight: bold; }
        .value { font-weight: 600; color: #1e293b; font-size: 0.95rem; }
        .copy-btn { background: white; border: 1px solid #e2e8f0; color: var(--primary); cursor: pointer; padding: 5px 8px; border-radius: 6px; }
        
        .timer-section { background: #f1f5f9; padding: 15px; border-radius: 16px; text-align: center; margin: 15px 0; }
        .timer-display { display: flex; justify-content: center; gap: 5px; margin-top: 8px; direction: ltr; }
        .time-unit { background: white; padding: 8px 4px; border-radius: 8px; min-width: 45px; border: 1px solid #e2e8f0; }
        .time-num { display: block; font-size: 1.1rem; font-weight: bold; color: var(--primary); }
        .time-lab { font-size: 0.6rem; color: #718096; }

        .btn-link { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-bottom: 10px; color: white; font-size: 0.95rem; border: none; cursor: pointer; }
        
        /* لوحة التحكم */
        .admin-panel { width: 100%; max-width: 1000px; display: none; }
        .admin-header { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* المودال */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; }
        .modal input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>

<div id="clientView" class="client-view">
    <div id="v-status-bar" class="status-bar"></div>
    <div class="client-header">
        <div class="brand-container">
            <div class="brand-logo">
                <img id="v-logo" style="width:100%; height:100%; object-fit:contain; display:none;">
                <i id="v-icon" class="fas fa-user-shield fa-2x" style="color:#ccc"></i>
            </div>
            <div class="date-box">
                <span id="v-day-txt" style="font-size:0.6rem; color:red; font-weight:bold;"></span>
                <span id="v-day-num" class="date-num"></span>
                <span id="v-month-txt" style="font-size:0.7rem; color:#666;"></span>
            </div>
        </div>
        <h2 id="v-name-container">مرحباً بك معنا 🤝 <span id="v-name"></span></h2>
        <span class="welcome-family">في أسرة فولتشر</span>
        <div class="progress-container"><div id="v-progress" class="progress-fill"></div></div>
    </div>

    <div class="info-body">
        <center><div id="v-status-text" class="status-msg"></div></center>
        <div class="info-row"><div><span class="label">تاريخ الانتهاء</span><br><span id="v-end" class="value"></span></div></div>
        <div class="info-row"><div><span class="label">اسم المستخدم</span><br><span id="v-user" class="value"></span></div><button class="copy-btn" onclick="copyTag('v-user')"><i class="far fa-copy"></i></button></div>
        <div class="info-row"><div><span class="label">كلمة السر</span><br><span id="v-pass" class="value"></span></div><button class="copy-btn" onclick="copyTag('v-pass')"><i class="far fa-copy"></i></button></div>
        
        <div class="timer-section"><span class="label">الوقت المتبقي لانتهاء الاشتراك</span><div id="timer" class="timer-display"></div></div>

        <a href="https://abonaoaf.github.io/az/" class="btn-link" style="background: #4338ca; border: 2px solid #fff;">
            <i class="fas fa-store"></i> متجر تطبيقات فولتشر 
        </a>
        <a href="https://wa.me/966594393012" class="btn-link" style="background:var(--whatsapp);" target="_blank">
            <i class="fab fa-whatsapp"></i> الدعم الفني المباشر
        </a>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <h2>لوحة إدارة فولتشر</h2>
        <div>
            <button class="copy-btn" style="padding:10px 20px" onclick="openModal()">+ إضافة مشترك</button>
            <input type="file" id="logoUpload" style="display:none" accept="image/*">
            <button class="copy-btn" onclick="document.getElementById('logoUpload').click()">تغيير الشعار</button>
        </div>
    </div>
    <div id="clientsGrid" class="clients-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>بيانات المشترك الجديد</h3>
        <input type="hidden" id="editIndex">
        <input type="text" id="in-name" placeholder="اسم العميل الكامل">
        <input type="text" id="in-user" placeholder="اسم المستخدم">
        <input type="text" id="in-pass" placeholder="كلمة السر">
        <label>تاريخ البداية:</label><input type="date" id="in-start">
        <label>تاريخ الانتهاء:</label><input type="date" id="in-end">
        <button class="btn-link" style="background:var(--success); border:none;" onclick="saveClient()">حفظ البيانات</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; cursor:pointer; color:gray;">إغلاق</button>
    </div>
</div>

<script>
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], config: { logo: "" } };
    const urlParams = new URLSearchParams(window.location.search);

    // تحميل البيانات
    async function init() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) {
                fullData.clients = data.clients || [];
                fullData.config = data.config || { logo: "" };
            }
            
            const userParam = urlParams.get('user');
            const adminParam = urlParams.get('admin');

            if (userParam) {
                const client = fullData.clients.find(c => c.name === decodeURIComponent(userParam));
                if (client) renderUserView(client); else document.body.innerHTML = "<h1>المشترك غير موجود</h1>";
            } else if (adminParam === "123" || adminParam === "AboNawaf_Platform_2026") {
                renderAdminView();
            } else {
                document.body.innerHTML = "<h1>يرجى استخدام رابط صحيح</h1>";
            }
        } catch (e) { console.error("Database Error"); }
        showLoading(false);
    }

    // عرض واجهة العميل
    function renderUserView(c) {
        document.getElementById('clientView').style.display = 'block';
        document.getElementById('v-name').innerText = c.name;
        document.getElementById('v-user').innerText = c.user;
        document.getElementById('v-pass').innerText = c.pass;
        document.getElementById('v-end').innerText = c.end;

        // التاريخ اليومي
        const today = new Date();
        document.getElementById('v-day-txt').innerText = today.toLocaleDateString('ar-SA', {weekday:'long'});
        document.getElementById('v-day-num').innerText = today.getDate();
        document.getElementById('v-month-txt').innerText = today.toLocaleDateString('ar-SA', {month:'long'});

        if (fullData.config.logo) {
            document.getElementById('v-logo').src = fullData.config.logo;
            document.getElementById('v-logo').style.display = 'block';
            document.getElementById('v-icon').style.display = 'none';
        }

        setInterval(() => startCountdown(c.start, c.end), 1000);
    }

    // عداد الوقت والبار
    function startCountdown(start, end) {
        const now = new Date().getTime();
        const expiry = new Date(end).getTime();
        const diff = expiry - now;
        
        const timer = document.getElementById('timer');
        const statusTxt = document.getElementById('v-status-text');
        const bar = document.getElementById('v-status-bar');
        const progress = document.getElementById('v-progress');

        if (diff <= 0) {
            timer.innerHTML = "<b style='color:red'>منتهي</b>";
            statusTxt.innerText = "❌ اشتراكك منتهي";
            bar.style.background = "var(--danger)";
            progress.style.width = "0%";
        } else {
            const d = Math.floor(diff/(1000*60*60*24)), h = Math.floor((diff/(1000*60*60))%24), m = Math.floor((diff/(1000*60))%60), s = Math.floor((diff/1000)%60);
            timer.innerHTML = `<div class="time-unit"><span class="time-num">${d}</span><span class="time-lab">يوم</span></div><div class="time-unit"><span class="time-num">${h}</span><span class="time-lab">ساعة</span></div><div class="time-unit"><span class="time-num">${m}</span><span class="time-lab">د</span></div><div class="time-unit"><span class="time-num">${s}</span><span class="time-lab">ث</span></div>`;
            statusTxt.innerText = "✅ اشتراكك فعال";
            bar.style.background = "var(--success)";
            
            const total = expiry - new Date(start).getTime();
            const perc = (diff / total) * 100;
            progress.style.width = (perc > 100 ? 100 : perc) + "%";
        }
    }

    // عرض لوحة التحكم
    function renderAdminView() {
        document.getElementById('adminPanel').style.display = 'block';
        const grid = document.getElementById('clientsGrid');
        grid.innerHTML = fullData.clients.map((c, i) => `
            <div class="card">
                <h4>${c.name}</h4>
                <p style="font-size:0.8rem">ينتهي: ${c.end}</p>
                <button class="copy-btn" onclick="copyClientLink('${c.name}')">نسخ رابط العميل</button>
                <button class="copy-btn" style="color:red" onclick="deleteClient(${i})">حذف</button>
            </div>
        `).join('');

        document.getElementById('logoUpload').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                fullData.config.logo = ev.target.result;
                await updateDB();
                alert("تم تغيير الشعار");
            };
            reader.readAsDataURL(e.target.files[0]);
        };
    }

    async function saveClient() {
        const client = {
            name: document.getElementById('in-name').value,
            user: document.getElementById('in-user').value,
            pass: document.getElementById('in-pass').value,
            start: document.getElementById('in-start').value,
            end: document.getElementById('in-end').value
        };
        fullData.clients.push(client);
        await updateDB();
        location.reload();
    }

    async function deleteClient(i) {
        if(confirm("هل تريد حذف هذا المشترك؟")) {
            fullData.clients.splice(i, 1);
            await updateDB();
            renderAdminView();
        }
    }

    async function updateDB() {
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
    }

    function copyClientLink(name) {
        const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(name);
        navigator.clipboard.writeText(url); alert("تم نسخ الرابط");
    }

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function copyTag(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("تم النسخ!"); }

    window.onload = init;
</script>
</body>
</html>
