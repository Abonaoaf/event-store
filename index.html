<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --danger: #dc3545; --text: #2d3748; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        
        /* تحسين العرض للجوال وسطح المكتب */
        .client-view { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; overflow: hidden; display: none; position: relative; margin: 20px auto; border: 1px solid #eee; }
        @media (min-width: 768px) { .client-view { max-width: 650px; } }

        .client-header { padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .brand-container { display: flex; justify-content: center; gap: 15px; align-items: center; }
        .brand-logo, .date-box { width: 90px; height: 90px; background: #fff; border-radius: 15px; border: 1px solid #eee; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .date-num { font-size: 1.5rem; font-weight: bold; color: #333; }
        
        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; float: right; transition: width 1s; }

        .info-body { padding: 20px; }
        .info-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #f9fbff; padding: 12px; border-radius: 10px; border: 1px solid #edf2f7; }
        .label { color: #777; font-size: 0.75rem; font-weight: bold; display: block; }
        .value { font-weight: 600; color: #333; font-size: 0.95rem; word-break: break-all; }
        .copy-btn { background: #fff; border: 1px solid #ddd; color: var(--primary); cursor: pointer; padding: 5px 10px; border-radius: 5px; }

        .timer-section { background: #f1f5f9; padding: 15px; border-radius: 15px; text-align: center; margin: 15px 0; }
        .timer-display { display: flex; justify-content: center; gap: 5px; direction: ltr; margin-top: 10px; }
        .time-unit { background: #fff; padding: 5px; border-radius: 5px; min-width: 40px; border: 1px solid #eee; }

        .btn-contact { display: block; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-bottom: 10px; color: white; }
        
        /* لوحة التحكم */
        .admin-panel { width: 100%; max-width: 1000px; display: none; }
        .clients-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; margin-top: 20px; }
        .client-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><b>جاري تحميل البيانات...</b></div>

<div id="clientView" class="client-view">
    <div class="client-header">
        <div class="brand-container">
            <div class="brand-logo"><img id="v-logo" style="width:70%; display:none;"><i id="v-icon" class="fas fa-user-shield fa-2x" style="color:#ccc"></i></div>
            <div class="date-box"><span id="v-day" style="font-size:0.7rem; color:red;"></span><span id="v-num" class="date-num"></span><span id="v-month" style="font-size:0.7rem;"></span></div>
        </div>
        <h2 id="v-name" style="margin:15px 0 5px;"></h2>
        <div class="progress-container"><div id="v-progress" class="progress-fill"></div></div>
        <div id="v-status-text" style="font-size:0.8rem; font-weight:bold;"></div>
    </div>
    <div class="info-body">
        <div class="info-row"><div><span class="label">تاريخ الانتهاء</span><span class="value" id="v-end"></span></div></div>
        <div class="info-row"><div><span class="label">اسم المستخدم</span><span class="value" id="v-plan"></span></div><button class="copy-btn" onclick="copyText('v-plan')"><i class="far fa-copy"></i></button></div>
        <div class="info-row"><div><span class="label">كلمة السر</span><span class="value" id="v-pass"></span></div><button class="copy-btn" onclick="copyText('v-pass')"><i class="far fa-copy"></i></button></div>
        <div class="info-row"><div><span class="label">رابط الدخول</span><span class="value" id="v-link"></span></div><button class="copy-btn" onclick="copyText('v-link')"><i class="far fa-copy"></i></button></div>
        
        <div class="timer-section"><span class="label">الوقت المتبقي</span><div id="timer" class="timer-display"></div></div>
        
        <a href="https://abonaoaf.github.io/az/" class="btn-contact" style="background:#4338ca;"><i class="fas fa-th-large"></i> متجر تطبيقات فولتشر</a>
        <a href="https://wa.me/966594393012" class="btn-contact" style="background:#25d366;"><i class="fab fa-whatsapp"></i> الدعم الفني المباشر</a>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="background:white; padding:20px; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
        <h3>لوحة إدارة المشتركين</h3>
        <button onclick="openModal()" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">+ إضافة مشترك</button>
    </div>
    <div id="clientsList" class="clients-list"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>بيانات المشترك</h3>
        <input type="hidden" id="editIndex">
        <label>الاسم</label><input type="text" id="in-name">
        <label>اسم المستخدم</label><input type="text" id="in-plan">
        <label>كلمة السر</label><input type="text" id="in-pass">
        <label>رابط الدخول</label><input type="text" id="in-link" value="https://vultr.com/login">
        <label>تاريخ النهاية</label><input type="date" id="in-expiry">
        <div style="display:flex; gap:10px;">
            <button onclick="saveClient()" style="flex:2; background:#007bff; color:white; border:none; padding:10px; border-radius:8px;">حفظ</button>
            <button onclick="closeModal()" style="flex:1; background:#eee; border:none; padding:10px; border-radius:8px;">إلغاء</button>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    const ADMIN_KEY = "AboNawaf_Platform_2026";
    let fullData = { clients: [] };
    const params = new URLSearchParams(window.location.search);

    async function loadData() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            fullData.clients = data?.clients || [];
            
            const user = params.get('user');
            const admin = params.get('admin');

            if (user) {
                showUser(decodeURIComponent(user));
            } else if (admin === ADMIN_KEY) {
                showAdmin();
            } else {
                document.body.innerHTML = "<h1>⚠️ غير مصرح</h1>";
            }
        } catch (e) { alert("خطأ في الاتصال بالخادم"); }
        document.getElementById('loading').style.display = 'none';
    }

    function showUser(name) {
        const c = fullData.clients.find(x => x.name === name);
        if (!c) { document.body.innerHTML = "<h1>المشترك غير موجود</h1>"; return; }
        document.getElementById('clientView').style.display = 'block';
        
        const d = new Date();
        document.getElementById('v-day').innerText = d.toLocaleDateString('ar-SA', {weekday:'long'});
        document.getElementById('v-num').innerText = d.getDate();
        document.getElementById('v-month').innerText = d.toLocaleDateString('ar-SA', {month:'long'});
        
        document.getElementById('v-name').innerText = "مرحباً: " + c.name;
        document.getElementById('v-plan').innerText = c.plan || '-';
        document.getElementById('v-pass').innerText = c.pass || '-';
        document.getElementById('v-link').innerText = c.link || 'https://vultr.com/login';
        document.getElementById('v-end').innerText = c.expiry || '-';

        updateProgress(c.expiry);
        setInterval(() => updateProgress(c.expiry), 1000);
    }

    function updateProgress(expiry) {
        const diff = new Date(expiry).getTime() - new Date().getTime();
        const bar = document.getElementById('v-progress');
        const txt = document.getElementById('v-status-text');
        
        if (diff <= 0) {
            bar.style.width = "0%"; bar.style.background = "red";
            txt.innerText = "❌ الاشتراك منتهي"; txt.style.color = "red";
            document.getElementById('timer').innerHTML = "انتهى الوقت";
        } else {
            bar.style.width = "100%"; 
            txt.innerText = "✅ الاشتراك مفعل"; txt.style.color = "green";
            
            const s = Math.floor(diff/1000), m = Math.floor(s/60), h = Math.floor(m/60), d = Math.floor(h/24);
            document.getElementById('timer').innerHTML = `
                <div class="time-unit"><b>${d}</b><br>يوم</div>
                <div class="time-unit"><b>${h%24}</b><br>ساعة</div>
                <div class="time-unit"><b>${m%60}</b><br>د</div>
            `;
        }
    }

    function showAdmin() {
        document.getElementById('adminPanel').style.display = 'block';
        const list = document.getElementById('clientsList');
        list.innerHTML = fullData.clients.map((c, i) => `
            <div class="client-item">
                <b>${c.name}</b><br><small>${c.expiry}</small>
                <div style="margin-top:10px; display:flex; gap:5px;">
                    <button onclick="copyLink('${c.name}')" style="flex:1; font-size:0.7rem;">نسخ الرابط</button>
                    <button onclick="editClient(${i})" style="flex:1; font-size:0.7rem;">تعديل</button>
                    <button onclick="deleteClient(${i})" style="flex:1; font-size:0.7rem; color:red;">حذف</button>
                </div>
            </div>
        `).join('');
    }

    async function saveClient() {
        const idx = document.getElementById('editIndex').value;
        const c = {
            name: document.getElementById('in-name').value,
            plan: document.getElementById('in-plan').value,
            pass: document.getElementById('in-pass').value,
            link: document.getElementById('in-link').value,
            expiry: document.getElementById('in-expiry').value
        };
        if (idx === "-1") fullData.clients.push(c); else fullData.clients[idx] = c;
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    function editClient(i) {
        openModal();
        document.getElementById('editIndex').value = i;
        const c = fullData.clients[i];
        document.getElementById('in-name').value = c.name;
        document.getElementById('in-plan').value = c.plan;
        document.getElementById('in-pass').value = c.pass;
        document.getElementById('in-link').value = c.link;
        document.getElementById('in-expiry').value = c.expiry;
    }

    async function deleteClient(i) {
        if(confirm("حذف؟")) {
            fullData.clients.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            location.reload();
        }
    }

    function copyText(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("تم النسخ"); }
    function copyLink(n) { const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(n); navigator.clipboard.writeText(url); alert("تم نسخ رابط المشترك"); }
    function openModal() { document.getElementById('modal').style.display='flex'; document.getElementById('editIndex').value="-1"; }
    function closeModal() { document.getElementById('modal').style.display='none'; }

    loadData();
</script>
</body>
</html>
