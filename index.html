<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المشتركين | فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --whatsapp: #25d366; --channel: #008069; --danger: #dc3545; --text: #2d3748; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text); }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .client-view, .admin-panel { background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; display: none; padding: 20px; text-align: center; }
        .status-bar { height: 6px; width: 100%; position: absolute; top: 0; left: 0; }
        .info-row { display: flex; justify-content: space-between; background: #f8fafc; padding: 10px; margin: 5px 0; border-radius: 12px; }
        .copy-btn { cursor: pointer; color: var(--primary); border: none; background: none; }
        .btn-contact { display: block; padding: 12px; margin-top: 10px; color: white; text-decoration: none; border-radius: 12px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>

<div id="clientView" class="client-view">
    <h2 id="v-name">مرحباً بك</h2>
    <div class="info-row"><span>اسم المستخدم:</span><b id="v-plan"></b><button class="copy-btn" onclick="copyTag('v-plan')">نسخ</button></div>
    <div class="info-row"><span>كلمة السر:</span><b id="v-pass"></b><button class="copy-btn" onclick="copyTag('v-pass')">نسخ</button></div>
    <div class="info-row"><span>ينتهي في:</span><b id="v-end"></b></div>
    <a href="https://abonaoaf.github.io/az/" class="btn-contact" style="background:#4338ca;">متجر تطبيقات فولتشر</a>
</div>

<div id="adminPanel" class="admin-panel" style="max-width: 800px;">
    <h3>لوحة الإدارة السحابية</h3>
    <button onclick="openModal()" style="background:var(--success); color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">+ إضافة مشترك</button>
    <div id="clientsList" style="margin-top:20px;"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>بيانات المشترك</h3>
        <input type="hidden" id="editIndex">
        <input type="text" id="in-name" placeholder="اسم العميل">
        <input type="text" id="in-plan" placeholder="اسم المستخدم">
        <input type="text" id="in-pass" placeholder="كلمة السر">
        <input type="date" id="in-expiry">
        <button onclick="saveClient()" style="background:var(--primary); color:white; width:100%; padding:10px; border:none; border-radius:8px; margin-top:10px;">حفظ</button>
        <button onclick="closeModal()" style="width:100%; background:none; border:none; cursor:pointer;">إلغاء</button>
    </div>
</div>

<script>
    const ADMIN_KEY = "AboNawaf_Platform_2026";
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], apps: [], config: {} };

    async function loadData() {
        showLoading(true);
        try {
            const response = await fetch(DB_URL);
            const data = await response.json();
            if (data) {
                fullData.clients = data.clients || [];
                fullData.apps = data.apps || [];
                fullData.config = data.config || {};
            }
            
            const params = new URLSearchParams(window.location.search);
            const user = params.get('user');
            const admin = params.get('admin');

            if (admin === ADMIN_KEY) {
                document.getElementById('adminPanel').style.display = 'block';
                renderClients();
            } else if (user) {
                const c = fullData.clients.find(x => x.name === decodeURIComponent(user));
                if (c) {
                    document.getElementById('clientView').style.display = 'block';
                    document.getElementById('v-name').innerText = "مرحباً: " + c.name;
                    document.getElementById('v-plan').innerText = c.plan;
                    document.getElementById('v-pass').innerText = c.pass;
                    document.getElementById('v-end').innerText = c.expiry;
                } else {
                    document.body.innerHTML = "<h1>المشترك غير موجود</h1>";
                }
            } else {
                document.body.innerHTML = "<h1>وصول غير مصرح به</h1>";
            }
        } catch (e) { console.error(e); }
        showLoading(false);
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        list.innerHTML = fullData.clients.map((c, i) => `
            <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${c.name}</span>
                <div>
                    <button onclick="copyClientUrl('${c.name}')">الرابط</button>
                    <button onclick="deleteClient(${i})" style="color:red">حذف</button>
                </div>
            </div>
        `).join('');
    }

    async function saveClient() {
        const newC = {
            name: document.getElementById('in-name').value,
            plan: document.getElementById('in-plan').value,
            pass: document.getElementById('in-pass').value,
            expiry: document.getElementById('in-expiry').value
        };
        fullData.clients.push(newC);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    async function deleteClient(i) {
        if(confirm("حذف؟")) {
            fullData.clients.splice(i, 1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            renderClients();
        }
    }

    function copyClientUrl(name) {
        const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(name);
        navigator.clipboard.writeText(url);
        alert("تم نسخ الرابط");
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function copyTag(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("تم النسخ!"); }

    window.onload = loadData;
</script>
</body>
</html>
