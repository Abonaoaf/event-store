<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المشتركين | فولتشر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --success: #28a745; --bg: #f4f7f6; --whatsapp: #25d366; --channel: #008069; --danger: #dc3545; --text: #2d3748; --warning: #ffc107; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; color: var(--text); }
        .status-bar { height: 6px; width: 100%; position: absolute; top: 0; left: 0; z-index: 10; }
        .status-msg { font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .progress-container { width: 100%; height: 10px; background: var(--danger); border-radius: 10px; margin: 15px 0; overflow: hidden; border: 1px solid #ddd; }
        .progress-fill { height: 100%; background: var(--success); width: 100%; transition: width 1s linear; float: right; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .client-view { background: white; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 420px; overflow: hidden; display: none; align-self: center; border: 1px solid rgba(0,0,0,0.05); position: relative; margin: 20px auto; }
        .client-header { background: white; color: black; padding: 30px 25px; text-align: center; position: relative; border-bottom: 1px solid #eee; }
        .brand-container { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .brand-logo, .date-box { width: 100px; height: 100px; background: white; padding: 10px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; }
        .date-box { border: 2px solid #f0f0f0; }
        .date-num { font-size: 1.6rem; font-weight: 900; color: #333; line-height: 1.1; }
        #v-name-container { margin: 10px 0 0 0; color: black; font-weight: 800; font-size: 1.3rem; }
        .welcome-msg { margin-top: 15px; font-size: 0.95rem; color: #4a5568; line-height: 1.6; }
        .welcome-family { font-weight: 800; color: #ff0000; display: block; margin-bottom: 20px; font-size: 1.1rem; }
        .info-body { padding: 20px; }
        .info-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #edf2f7; }
        .label { color: #64748b; font-size: 0.7rem; font-weight: bold; }
        .value { font-weight: 600; color: #1e293b; font-size: 0.9rem; word-break: break-all; }
        .copy-btn { background: white; border: 1px solid #e2e8f0; color: var(--primary); cursor: pointer; padding: 6px 10px; border-radius: 8px; }
        .timer-section { background: #f1f5f9; padding: 15px; border-radius: 16px; text-align: center; margin: 15px 0; border: 1px solid #e2e8f0; }
        .timer-display { display: flex; justify-content: center; gap: 5px; margin-top: 10px; direction: ltr; }
        .time-unit { background: white; padding: 8px 4px; border-radius: 8px; min-width: 42px; text-align: center; border: 1px solid #e2e8f0; }
        .btn-contact { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-bottom: 10px; color: white; font-size: 0.9rem; border: none; }
        .admin-panel { width: 100%; max-width: 1100px; display: none; }
        .admin-header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; background: white; padding: 15px 25px; border-radius: 20px; }
        .clients-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 20px; }
        .client-item { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 480px; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><div class="spinner"></div><p>جاري تحميل البيانات...</p></div>

<div id="clientView" class="client-view">
    <div id="v-status-bar" class="status-bar"></div>
    <div class="client-header">
        <div class="brand-container">
            <div class="brand-logo">
                <img id="v-logo" style="width:100%; height:100%; object-fit:contain; display:none;">
                <i id="v-icon" class="fas fa-user-shield fa-3x" style="color:#ddd"></i>
            </div>
            <div class="date-box">
                <span style="font-size:0.6rem; color:red" id="v-today-name"></span>
                <span class="date-num" id="v-today-num"></span>
                <span style="font-size:0.7rem;" id="v-today-month"></span>
            </div>
        </div>
        
        <h2 id="v-name-container">مرحباً بك معنا 🤝 <span id="v-name"></span></h2>
        
        <div class="welcome-msg">
            <span class="welcome-family">في أسرة فولتشر</span>
            نتطلع لخدمتك بأفضل ما لدينا
        </div>
        <div class="progress-container"><div id="v-progress" class="progress-fill"></div></div>
    </div>

    <div class="info-body">
        <center><div id="v-status-text" class="status-msg"></div></center>
        <div class="info-row"><div><span class="label">تاريخ النهاية</span><br><span class="value" id="v-end"></span></div></div>
        <div class="info-row"><div><span class="label">اسم المستخدم</span><br><span id="v-plan" class="value"></span></div><button class="copy-btn" onclick="copyTag('v-plan')"><i class="far fa-copy"></i></button></div>
        <div class="info-row"><div><span class="label">كلمة السر</span><br><span id="v-pass" class="value"></span></div><button class="copy-btn" onclick="copyTag('v-pass')"><i class="far fa-copy"></i></button></div>
        
        <div class="timer-section"><span class="label">الوقت المتبقي</span><div id="timer" class="timer-display"></div></div>

        <a href="https://abonaoaf.github.io/az/" class="btn-contact" style="background: #4338ca; border: 2px solid #fff;">
            <i class="fas fa-th-large"></i> متجر تطبيقات فولتشر 
        </a>
        <a href="https://wa.me/966594393012" class="btn-contact" style="background:var(--whatsapp);" target="_blank">
            <i class="fab fa-whatsapp"></i> الدعم الفني المباشر
        </a>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>لوحة التحكم</h2>
            <button class="btn-contact" style="background:var(--success); width:auto;" onclick="openModal()">+ مشترك جديد</button>
        </div>
        <input type="file" id="logoInput" accept="image/*">
    </div>
    <div id="clientsList" class="clients-list"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3>بيانات المشترك</h3>
        <input type="hidden" id="editIndex">
        <input type="text" id="in-name" placeholder="الاسم" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="in-plan" placeholder="اسم المستخدم" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="in-pass" placeholder="كلمة السر" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="date" id="in-start" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="date" id="in-expiry" style="width:100%; margin-bottom:10px; padding:8px;">
        <button onclick="saveClient()" style="background:var(--success); color:white; border:none; padding:10px; width:100%;">حفظ</button>
        <button onclick="closeModal()" style="width:100%; margin-top:5px; border:none; padding:5px;">إلغاء</button>
    </div>
</div>

<script>
    const DB_URL = "https://vulture-app-1efba-default-rtdb.firebaseio.com/.json";
    let fullData = { clients: [], config: { logo: "" } };
    const params = new URLSearchParams(window.location.search);

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data) { fullData = data; if(!fullData.clients) fullData.clients = []; }
            
            const user = params.get('user');
            const admin = params.get('admin');

            if (user) { 
                showUser(decodeURIComponent(user));
            } else if (admin === "123") { 
                renderClients();
                document.getElementById('adminPanel').style.display = 'block';
            }
        } catch (e) { console.log(e); }
        showLoading(false);
    }

    function showUser(name) {
        const c = fullData.clients.find(x => x.name === name);
        if (!c) return document.body.innerHTML = "المشترك غير موجود";
        
        document.getElementById('clientView').style.display = 'block';
        document.getElementById('v-name').innerText = c.name;
        document.getElementById('v-plan').innerText = c.plan;
        document.getElementById('v-pass').innerText = c.pass;
        document.getElementById('v-end').innerText = c.expiry;
        
        const today = new Date();
        document.getElementById('v-today-name').innerText = today.toLocaleDateString('ar-SA', {weekday:'long'});
        document.getElementById('v-today-num').innerText = today.getDate();
        document.getElementById('v-today-month').innerText = today.toLocaleDateString('ar-SA', {month:'long'});

        if (fullData.config.logo) {
            document.getElementById('v-logo').src = fullData.config.logo;
            document.getElementById('v-logo').style.display = 'block';
            document.getElementById('v-icon').style.display = 'none';
        }

        setInterval(() => updateTimer(c.expiry), 1000);
    }

    function updateTimer(expiry) {
        const diff = new Date(expiry).getTime() - new Date().getTime();
        const txt = document.getElementById('v-status-text');
        const bar = document.getElementById('v-status-bar');
        
        if (diff <= 0) {
            document.getElementById('timer').innerHTML = "منتهي";
            txt.innerText = "❌ اشتراك منتهي";
            bar.style.background = "var(--danger)";
        } else {
            const d = Math.floor(diff/(1000*60*60*24));
            const h = Math.floor((diff/(1000*60*60))%24);
            const m = Math.floor((diff/(1000*60))%60);
            const s = Math.floor((diff/1000)%60);
            document.getElementById('timer').innerHTML = `<div class="time-unit">${d}<span>يوم</span></div><div class="time-unit">${h}<span>ساعة</span></div><div class="time-unit">${m}<span>د</span></div><div class="time-unit">${s}<span>ث</span></div>`;
            txt.innerText = "✅ اشتراك فعال";
            bar.style.background = "var(--success)";
        }
    }

    function renderClients() {
        const list = document.getElementById('clientsList');
        list.innerHTML = fullData.clients.map((c, i) => `
            <div class="client-item">
                <h4>${c.name}</h4>
                <button onclick="copyUrl('${c.name}')">نسخ الرابط</button>
                <button onclick="deleteClient(${i})">حذف</button>
            </div>
        `).join('');
    }

    async function saveClient() {
        const c = {
            name: document.getElementById('in-name').value,
            plan: document.getElementById('in-plan').value,
            pass: document.getElementById('in-pass').value,
            start: document.getElementById('in-start').value,
            expiry: document.getElementById('in-expiry').value
        };
        fullData.clients.push(c);
        await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
        location.reload();
    }

    async function deleteClient(i) {
        if(confirm("حذف؟")) {
            fullData.clients.splice(i,1);
            await fetch(DB_URL, { method: 'PUT', body: JSON.stringify(fullData) });
            renderClients();
        }
    }

    function copyUrl(n) {
        const url = window.location.origin + window.location.pathname + "?user=" + encodeURIComponent(n);
        navigator.clipboard.writeText(url); alert("تم النسخ");
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function copyTag(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("تم النسخ"); }

    window.onload = loadData;
</script>
</body>
</html>
