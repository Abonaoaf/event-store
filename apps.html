<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر قبل الحدث - التطبيقات الحصرية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; text-align: center; border-radius: 0 0 30px 30px; }
        .brand-logo { width: 80px; height: auto; border-radius: 15px; margin-bottom: 10px; border: 2px solid white; }
        .container { padding: 20px; max-width: 600px; margin: auto; }

        /* لوحة التحكم (المسؤول) */
        #adminPanel { display: none; background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 25px; border: 2px solid var(--primary); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: 1 / -1; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; margin-top: 5px; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        
        /* كروت التطبيقات (العميل) */
        .app-card { background: var(--white); border-radius: 20px; padding: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; position: relative; }
        .version-tag { position: absolute; left: 15px; top: 15px; background: #e0e7ff; color: var(--primary); font-size: 0.7rem; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
        .app-flex { display: flex; align-items: center; gap: 15px; }
        .app-img { border-radius: 15px; object-fit: cover; background: #f1f5f9; }
        .app-info h3 { margin: 0; font-size: 1.1rem; }
        .btn-download { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--primary); color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold; margin-top: 15px; }
        
        .loading { text-align: center; padding: 30px; color: var(--primary); font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://abonaoaf.github.io/apps/hdh.PNG" class="brand-logo">
    <h2 id="mainTitle">متجر تطبيقات قبل الحدث</h2>
</div>

<div class="container">
    <div id="adminPanel">
        <b style="color:var(--primary)"><i class="fas fa-plus"></i> إضافة تطبيق للمتجر</b>
        <div class="form-grid">
            <input type="text" id="appName" class="full" placeholder="اسم التطبيق">
            <div class="full">
               <label style="font-size: 0.7rem;">اختر الصورة من جهازك:</label>
               <input type="file" id="appImgFile" accept="image/*" onchange="processImage(this)">
            </div>
            <input type="text" id="appVer" placeholder="رقم الإصدار (مثلاً 2.1)">
            <input type="number" id="appSize" placeholder="حجم الأيقونة (70)">
            <input type="text" id="appLink" class="full" placeholder="رابط التحميل المباشر">
        </div>
        <button class="btn-save" onclick="saveNewApp()">نشر في المتجر</button>
        <div id="adminList" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"></div>
    </div>

    <div id="loader" class="loading"><i class="fas fa-sync fa-spin"></i> جاري تحديث التطبيقات...</div>
    <div id="appsGrid"></div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة لبطاقة الاشتراك</a>
</div>

<script>
    const BIN_ID = '69ccd25636566621a86b0b49'; 
    const API_KEY = '$2a$10$tF3fZ9rbdTzLIljwr83BlOtuLCKngwBUbeK9//NpVH8Mwkfh4GTmu';
    let storeData = { apps: [], news: "" };
    let tempImage = "";

    async function init() {
        try {
            // جلب البيانات مع محاولة تقليل الطلبات
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const data = await res.json();
            storeData = data.record;
            if(!storeData.apps) storeData.apps = [];

            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === '123') {
                document.getElementById('adminPanel').style.display = 'block';
                renderAdminList();
            }
            
            renderApps();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { document.getElementById('loader').innerText = "خطأ في الاتصال بالسحابة"; }
    }

    function renderApps() {
        const grid = document.getElementById('appsGrid');
        grid.innerHTML = storeData.apps.map(app => `
            <div class="app-card">
                <span class="version-tag">إصدار ${app.version || '1.0'}</span>
                <div class="app-flex">
                    <img src="${app.img}" style="width:${app.size || 70}px; height:${app.size || 70}px;" class="app-img">
                    <div class="app-info"><h3>${app.name}</h3></div>
                </div>
                <a href="${app.link}" class="btn-download"><i class="fas fa-download"></i> تحميل مباشر</a>
            </div>
        `).join('');
    }

    function renderAdminList() {
        const list = document.getElementById('adminList');
        list.innerHTML = storeData.apps.map((app, i) => `
            <div style="display:flex; justify-content:space-between; padding:8px; background:#f1f5f9; margin-bottom:5px; border-radius:8px; font-size:0.8rem;">
                <span>${app.name}</span>
                <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="deleteApp(${i})"></i>
            </div>
        `).join('');
    }

    function processImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const max = 150; // حجم الصورة مخفض لتوفير المساحة
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    tempImage = canvas.toDataURL('image/jpeg', 0.7);
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveNewApp() {
        const name = document.getElementById('appName').value;
        const link = document.getElementById('appLink').value;
        const ver = document.getElementById('appVer').value;
        const size = document.getElementById('appSize').value;

        if (!name || !link || !tempImage) return alert("أكمل البيانات وارفع الصورة");

        storeData.apps.push({ name, link, img: tempImage, version: ver, size: size });
        await sync();
        location.reload();
    }

    async function deleteApp(i) {
        if(confirm("حذف التطبيق؟")) {
            storeData.apps.splice(i, 1);
            await sync();
            location.reload();
        }
    }

    async function sync() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(storeData)
        });
    }

    init();
</script>
</body>
</html>
