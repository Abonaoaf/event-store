<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر قبل الحدث | التطبيقات الحصرية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #4338ca; --secondary: #6366f1; --bg: #f8fafc; --white: #ffffff; --text: #1e293b; --success: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); padding-bottom: 50px; }
        
        /* الهيدر الجديد */
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 20px rgba(67, 56, 202, 0.2); }
        .brand-logo { width: 90px; height: auto; border-radius: 20px; margin-bottom: 12px; border: 3px solid rgba(255,255,255,0.3); }
        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* لوحة التحكم للمسؤول */
        #adminPanel { display: none; background: var(--white); padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 30px; border: 2px dashed var(--primary); }
        .admin-title { color: var(--primary); font-weight: bold; margin-bottom: 15px; display: block; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full { grid-column: 1 / -1; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 0.9rem; }
        .btn-save { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .btn-save:hover { background: var(--secondary); }
        
        /* كروت التطبيقات */
        .app-card { background: var(--white); border-radius: 25px; padding: 18px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; position: relative; transition: 0.3s; }
        .app-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
        .version-tag { position: absolute; left: 15px; top: 15px; background: #e0e7ff; color: var(--primary); font-size: 0.7rem; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .app-flex { display: flex; align-items: center; gap: 15px; }
        .app-img { border-radius: 18px; object-fit: cover; background: #f8fafc; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .app-info h3 { margin: 0; font-size: 1.1rem; color: #1e293b; }
        .btn-download { display: flex; align-items: center; justify-content: center; gap: 10px; background: #f1f5f9; color: var(--primary); text-decoration: none; padding: 14px; border-radius: 15px; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-download:hover { background: var(--primary); color: white; }
        
        .loading { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
        .back-link { display: block; text-align: center; margin-top: 30px; color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.95rem; }
        
        /* قائمة الحذف للمسؤول */
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #fff5f5; margin-top: 8px; border-radius: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://abonaoaf.github.io/apps/hdh.PNG" class="brand-logo" alt="قبل الحدث">
    <h2 style="margin:0; font-size: 1.4rem;">متجر قبل الحدث</h2>
    <p style="margin:5px 0 0; opacity: 0.8; font-size: 0.85rem;">الإصدارات الحصرية للمشتركين</p>
</div>

<div class="container">
    <div id="adminPanel">
        <span class="admin-title"><i class="fas fa-tools"></i> إضافة تطبيق جديد</span>
        <div class="form-grid">
            <input type="text" id="appName" class="full" placeholder="اسم التطبيق (مثلاً: VULTURE TV)">
            <div class="full" style="background: #f8fafc; padding: 10px; border-radius: 12px;">
               <label style="font-size: 0.75rem; color: #64748b; display: block; margin-bottom: 5px;">أيقونة التطبيق:</label>
               <input type="file" id="appImgFile" accept="image/*" onchange="processImage(this)">
            </div>
            <input type="text" id="appVer" placeholder="الإصدار (2.1)">
            <input type="number" id="appSize" placeholder="الحجم (70)">
            <input type="text" id="appLink" class="full" placeholder="رابط التحميل المباشر">
        </div>
        <button class="btn-save" id="saveBtn" onclick="saveNewApp()">نشر التطبيق الآن</button>
        <div id="adminList" style="margin-top:20px;"></div>
    </div>

    <div id="loader" class="loading"><i class="fas fa-circle-notch fa-spin"></i> جاري مزامنة المتجر...</div>
    <div id="appsGrid"></div>

    <a href="javascript:history.back()" class="back-link">
        <i class="fas fa-chevron-right"></i> العودة لبطاقة الاشتراك
    </a>
</div>

<script>
    const BIN_ID = '69ccd25636566621a86b0b49'; 
    const API_KEY = '$2a$10$tF3fZ9rbdTzLIljwr83BlOtuLCKngwBUbeK9//NpVH8Mwkfh4GTmu';
    let storeData = { clients: [], apps: [], news: "" };
    let tempImage = "";

    async function init() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { 'X-Master-Key': API_KEY } });
            const data = await res.json();
            storeData = data.record;
            if(!storeData.apps) storeData.apps = [];

            // إذا دخلت عن طريق رابط الآدمن
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === '123') {
                document.getElementById('adminPanel').style.display = 'block';
                renderAdminList();
            }
            
            renderApps();
            document.getElementById('loader').style.display = 'none';
        } catch (e) { 
            document.getElementById('loader').innerHTML = "<span style='color:red'>خطأ في المزامنة</span>"; 
        }
    }

    function renderApps() {
        const grid = document.getElementById('appsGrid');
        if (storeData.apps.length === 0) {
            grid.innerHTML = "<p style='text-align:center; color:#94a3b8;'>لا توجد تطبيقات متوفرة حالياً</p>";
            return;
        }
        grid.innerHTML = storeData.apps.map(app => `
            <div class="app-card">
                <span class="version-tag">V ${app.version || '1.0'}</span>
                <div class="app-flex">
                    <img src="${app.img}" style="width:${app.size || 70}px; height:${app.size || 70}px;" class="app-img">
                    <div class="app-info"><h3>${app.name}</h3></div>
                </div>
                <a href="${app.link}" class="btn-download" target="_blank"><i class="fas fa-cloud-download-alt"></i> تحميل التطبيق</a>
            </div>
        `).join('');
    }

    function renderAdminList() {
        const list = document.getElementById('adminList');
        list.innerHTML = "<b style='font-size:0.8rem;'>إدارة المحتوى الحالي:</b>" + storeData.apps.map((app, i) => `
            <div class="admin-item">
                <span>${app.name}</span>
                <i class="fas fa-trash-alt" style="color:red; cursor:pointer;" onclick="deleteApp(${i})"></i>
            </div>
        `).join('');
    }

    function processImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const max = 150; 
                    let w = img.width, h = img.height;
                    if (w > h) { if (w > max) { h *= max / w; w = max; } }
                    else { if (h > max) { w *= max / h; h = max; } }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    tempImage = canvas.toDataURL('image/jpeg', 0.7);
                };
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function saveNewApp() {
        const btn = document.getElementById('saveBtn');
        const name = document.getElementById('appName').value;
        const link = document.getElementById('appLink').value;
        const ver = document.getElementById('appVer').value || "1.0";
        const size = document.getElementById('appSize').value || "70";

        if (!name || !link || !tempImage) return alert("فضلاً أكمل البيانات وارفع أيقونة");

        btn.innerText = "جاري النشر...";
        btn.disabled = true;

        storeData.apps.push({ name, link, img: tempImage, version: ver, size: size });
        await sync();
        location.reload();
    }

    async function deleteApp(i) {
        if(confirm("هل أنت متأكد من حذف هذا التطبيق من المتجر؟")) {
            storeData.apps.splice(i, 1);
            await sync();
            location.reload();
        }
    }

    async function sync() {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
            body: JSON.stringify(storeData)
        });
    }

    init();
</script>
</body>
</html>
